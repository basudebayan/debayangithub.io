<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syllabus Feedback</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #003366; color: white; padding: 15px; text-align: center; }
        nav { background: #004080; padding: 10px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        main { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; margin-top: 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        footer { background: #333; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
        #successMsg { display: none; color: green; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <h1>Student Feedback Form</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">Course Structure</a>
    </nav>

    <main>
        <h3>Share Your Thoughts</h3>
        <p>Your feedback helps us improve the English syllabus experience.</p>
        <form id="feedbackForm">
            <label for="userName">Full Name:</label>
            <input type="text" id="userName" placeholder="Enter your name" required>

            <label for="userFeedback">Comments:</label>
            <textarea id="userFeedback" rows="5" placeholder="Your comments on the CCF 2022 structure..." required></textarea>

            <button type="submit">Submit Feedback</button>
        </form>
        <div id="successMsg">Feedback received! Thank you for your input.</div>
    </main>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect Form Data
            const name = document.getElementById('userName').value;
            const comments = document.getElementById('userFeedback').value;

            // Log to console (Simulating a database save)
            console.log("Feedback Captured:", {
                Name: name,
                Comment: comments,
                Date: new Date().toLocaleString()
            });

            // Feedback logic
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        });
    </script>

    <footer>
        &copy; 2025 Calcutta University Registrar's Office
    </footer>
</body>
</html>
